        <nav class="sidebar-nav">
            <ul class="nav-list primary-nav">
                <li class="nav-item">
                    <a href="../seiten/index.html" class="nav-link">
                        <i data-lucide="home" class="nav-icon"></i>
                        <span class="nav-label">Home</span> 
                    </a>
                    <span class="nav-tooltip">Home</span>
                </li>
                <li class="nav-item">
                    <a href="../seiten/Dashboard.html" class="nav-link">
                        <i data-lucide="layout-dashboard" class="nav-icon"></i>
                        <span class="nav-label">Dashboard</span> 
                    </a>
                    <span class="nav-tooltip">Dashboard</span>

                <li class="nav-item">

                <li class="nav-item">

            </ul>
        </nav>
    </aside>
<!-- Sidebar Ende -->


<main class="inhalt">
    <header class="page-header">
        <h1>Vereinskalender</h1>
    </header>

<div class="container">
    <div class="calendar-container">
        <div class="calendar-header">
            <div class="nav-buttons">
                <button class="nav-btn" id="prev-month"><i data-lucide="chevron-left"></i></button>
                <button class="nav-btn" id="next-month"><i data-lucide="chevron-right"></i></i></button>
        </div>
        <div class="month-year" id="month-year">Mai 2026</div>
    </div>

    <div class="weekdays">
        <div class="weekday">Mo</div>
        <div class="weekday">Di</div>
        <div class="weekday">Mi</div>
        <div class="weekday">Do</div>
        <div class="weekday">Fr</div>
        <div class="weekday">Sa</div>
        <div class="weekday">So</div>
    </div>

    <div class="days" id="days"></div>

    <div class="calendar-footer">
        <button class="today-btn" id="today-btn"><i data-lucide="calendar-days"></i> Heute</button>
        <div class="event-indicator">
            <i class="fas fa-circle" style="color: var(--accent); font-size: 0.6 rem;"></i>
            <span>Veranstaltung</span>
        </div>
    </div>

    <div class="event-panel" id="event-panel">
        <div class="event-holder">
            <div class="event-date" id="event-date">Datum auswählen</div>
            <i data-lucide="calendar" class="event-icon"></i>
        </div>
        <div class="event-list" id=""event-liste">
            <div class="no-events">Keine Veranstaltung eingetragen</div>
        </div>
    </div>
</div>


<script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
    
  <script src="../js/vereinskalender.js"></script>
  <script src="../js/menue.js"></script>
